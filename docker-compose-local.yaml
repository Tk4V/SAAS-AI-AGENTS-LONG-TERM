# Full local stack: Postgres + Alembic migrations + FastAPI app with hot reload.
# A single `docker compose up` brings everything online — no host venv required.
name: clyde-ai-local

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: clyde_postgres_local
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clyde}
      POSTGRES_USER: ${POSTGRES_USER:-clyde}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clyde}
    ports:
      - "5432:5432"
    volumes:
      - clyde_pg_local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clyde}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: clyde_redis_local
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - clyde_redis_local:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REQUIREMENTS: dev
    container_name: clyde_migrate_local
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-clyde}
      DB_USER: ${POSTGRES_USER:-clyde}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-clyde}
      DB_SSL: disable
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REQUIREMENTS: dev
    container_name: clyde_app_local
    restart: unless-stopped
    user: root
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      APP_ENV: local
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-clyde}
      DB_USER: ${POSTGRES_USER:-clyde}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-clyde}
      DB_SSL: disable
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./alembic.ini:/app/alembic.ini
      - ./tests:/app/tests
      - ./scripts:/app/scripts
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - uvicorn
      - src.api.app:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
      - --reload-dir
      - /app/src

volumes:
  clyde_pg_local:
  clyde_redis_local:
